<!-- Hero -->
<os-mkt-section background="hero">
  <os-mkt-hero
    [title]="hero.title"
    [subtitle]="hero.subtitle"
    alignment="center" />
</os-mkt-section>

<!-- Plan cards with billing toggle -->
<os-mkt-section>
  <os-plan-cards />
</os-mkt-section>

<!-- Processing rates -->
<os-mkt-section background="alt">
  <os-processing-rates />
</os-mkt-section>

<!-- Competitor comparison -->
<os-mkt-section>
  <os-competitor-comparison />
</os-mkt-section>

<!-- Savings calculator -->
<os-mkt-section background="dark">
  <os-savings-calculator />
</os-mkt-section>

<!-- Testimonials -->
<os-testimonial-section />

<!-- FAQ -->
<os-mkt-section background="alt">
  <os-pricing-faq />
</os-mkt-section>

<!-- Final CTA -->
<os-final-cta />
