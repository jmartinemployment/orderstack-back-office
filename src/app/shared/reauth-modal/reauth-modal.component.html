@if (visible()) {
  <div class="reauth-overlay" (click)="cancel()" (keydown.escape)="cancel()">
    <div class="reauth-modal" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <div class="reauth-modal__header">
        <h3>Confirm Your Password</h3>
        <p>For security, please re-enter your password to access this section.</p>
      </div>
      <div class="reauth-modal__body">
        @if (error()) {
          <div class="alert alert-danger py-2 mb-3">{{ error() }}</div>
        }
        <div class="mb-3">
          <label class="form-label" for="reauth-password">Password</label>
          <input
            id="reauth-password"
            type="password"
            class="form-control"
            autocomplete="current-password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            (keydown.enter)="verify()"
            [disabled]="isVerifying()"
          />
        </div>
      </div>
      <div class="reauth-modal__footer">
        <button class="btn btn-outline-secondary" (click)="cancel()" [disabled]="isVerifying()">Cancel</button>
        <button class="btn btn-primary" (click)="verify()" [disabled]="isVerifying() || !password()">
          @if (isVerifying()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          Confirm
        </button>
      </div>
    </div>
  </div>
}
